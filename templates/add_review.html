<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMIS STORES | Add Review</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f7fbff;
    color:#1e293b;
    min-height:100vh;
    padding-bottom:100px;
}

/* HERO */

.hero{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    padding:60px 20px;
    text-align:center;
    color:white;
}

.logo{
    font-size:30px;
    font-weight:700;
    margin-bottom:10px;
}

.hero h1{
    font-size:42px;
    margin-bottom:10px;
}

.hero p{
    font-size:17px;
}

/* REVIEW CARD */

.review-container{
    width:95%;
    max-width:800px;
    margin:30px auto;
}

.review-card{
    background:white;
    border-radius:24px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

/* PRODUCT INFO */

.product-preview{
    display:flex;
    align-items:center;
    gap:18px;
    margin-bottom:25px;
    padding-bottom:20px;
    border-bottom:1px solid #e2e8f0;
}

.product-image{
    width:110px;
    height:110px;
    object-fit:contain;
    background:#f8fafc;
    border-radius:16px;
    padding:10px;
    border:1px solid #e2e8f0;
}

.product-info h2{
    font-size:22px;
    margin-bottom:8px;
}

.product-info p{
    color:#64748b;
}

/* FORM */

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

select,
textarea,
input[type="file"]{
    width:100%;
    border:1px solid #e2e8f0;
    border-radius:12px;
    padding:14px;
    font-size:15px;
    outline:none;
}

textarea{
    min-height:150px;
    resize:vertical;
}

select:focus,
textarea:focus{
    border-color:#4facfe;
}

/* BUTTONS */

.button-group{
    display:flex;
    gap:12px;
    margin-top:25px;
}

.btn{
    flex:1;
    text-decoration:none;
    border:none;
    padding:14px;
    border-radius:12px;
    text-align:center;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

.submit-btn{
    background:linear-gradient(
        135deg,
        #4facfe,
        #00f2fe
    );
    color:white;
}

.cancel-btn{
    background:#0f172a;
    color:white;
}

/* MOBILE */

@media(max-width:768px){

    .hero h1{
        font-size:32px;
    }

    .product-preview{
        flex-direction:column;
        text-align:center;
    }

    .product-image{
        width:100px;
        height:100px;
    }

    .button-group{
        flex-direction:column;
    }

}

</style>
</head>

<body>

<section class="hero">

<div class="logo">
SMIS STORES
</div>

<h1>⭐ Add Review</h1>

<p>
Share your experience with this product
</p>

</section>

<div class="review-container">

<div class="review-card">

<div class="product-preview">

{% if order.image %}
<img
src="{{ url_for('static', filename='uploads/' + order.image) }}"
class="product-image">
{% else %}
<img
src="https://picsum.photos/300/300?random={{ order.id }}"
class="product-image">
{% endif %}

<div class="product-info">
<h2>{{ order.product_name }}</h2>
<p>Order #{{ order.id }}</p>
</div>

</div>

<form
method="POST"
action="/review/{{ order.id }}"
enctype="multipart/form-data">

<div class="form-group">

<label>
⭐ Rating
</label>

<select name="rating" required>
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Very Good</option>
<option value="3">⭐⭐⭐ Good</option>
<option value="2">⭐⭐ Fair</option>
<option value="1">⭐ Poor</option>
</select>

</div>

<div class="form-group">

<label>
✍️ Your Review
</label>

<textarea
name="review"
placeholder="Tell others about your experience..."
required></textarea>

</div>

<div class="form-group">

<label>
📷 Upload Review Image (Optional)
</label>

<input
type="file"
name="review_image"
accept="image/*">

</div>

<div class="button-group">

<a
href="/orders"
class="btn cancel-btn">
← Back to Orders
</a>

<button
type="submit"
class="btn submit-btn">
Submit Review
</button>

</div>

</form>

</div>

</div>

{% include 'navbar_bottom.html' %}

</body>
</html>
