<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

/* Navbar */
.navbar{
    background:#111827;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar h2{
    color:#fff;
}

.navbar a{
    color:white;
    text-decoration:none;
    background:#2563eb;
    padding:10px 15px;
    border-radius:8px;
    margin-left:10px;
}

.navbar a:hover{
    background:#1d4ed8;
}

/* Heading */
.heading{
    text-align:center;
    margin:30px 0;
}

/* Grid */
.product-container{
width:92%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
padding-bottom:50px;
}

/* Card */
.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 6px 16px rgba(0,0,0,.08);
transition:.25s;
max-width:260px;
margin:auto;
}

.card:hover{
    transform:translateY(-8px);
}

.product-image{
width:100%;
height:160px;
object-fit:cover;
}

.card-body{
    padding:12px;
}

.product-name{
font-size:18px;
font-weight:600;
margin-bottom:6px;
}
.stock{
display:inline-block;
padding:4px 10px;
border-radius:20px;
font-size:11px;
color:white;
margin-bottom:10px;
}
.description{
font-size:13px;
color:#666;
height:38px;
overflow:hidden;
}

.price{
font-size:20px;
font-weight:bold;
color:#16a34a;
margin:10px 0;
}

/* Buttons */
.btn{
    display:block;
    text-align:center;
    padding:10px;
    border-radius:8px;
    text-decoration:none;
    margin-top:8px;
    font-weight:bold;
}

.cart{
    background:#2563eb;
    color:white;
}

.cart:hover{
    background:#1d4ed8;
}

.buy{
    background:#16a34a;
    color:white;
}

.buy:hover{
    background:#15803d;
}
</style>
</head>

<body>

<div class="navbar">

    <h2>🛒 User Dashboard</h2>

    <div>
        <a href="/cart">Cart</a>
        <a href="/orders">Orders</a>
        <a href="/logout">Logout</a>
    </div>

</div>

<div class="heading">
    <h1>Welcome User 👋</h1>
    <p>Explore products and start shopping</p>
</div>

<div class="product-container">

{% for p in products %}

<div class="card">

    <img src="https://picsum.photos/400/250?random={{p.id}}" class="product-image">

    <div class="card-body">

        <h3 class="product-name">{{ p.name }}</h3>

        <p class="description">{{ p.description }}</p>

        <div class="price">₹ {{ p.price }}</div>

        <a href="/addcart/{{p.id}}" class="btn cart">Add To Cart</a>
        <a href="/buynow/{{p.id}}" class="btn buy">Buy Now</a>

    </div>

</div>

{% endfor %}

</div>
<div class="bottom-nav">
    <a href="/provider_orders">🏠<span>Orders/span></a>
    <a href="/analytics">📊<span>Stats</span></a>
    <a href="/add_product">➕<span>Add</span></a>
    <a href="/reviews">⭐<span>Reviews</span></a>
    <a href="/provider_profile">🚪<span>Profile</span></a>
</div>
</body>
</html>
