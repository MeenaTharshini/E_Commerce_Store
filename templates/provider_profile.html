<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Provider Profile</title>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f7fbff;
    padding-bottom:90px;
}

/* HERO */
.hero{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
    text-align:center;
    padding:60px 20px;
}

.avatar{
    width:100px;
    height:100px;
    margin:auto;
    border-radius:50%;
    background:white;
    color:#4facfe;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
    margin-bottom:10px;
}

.hero h1{
    font-size:30px;
}

.hero p{
    opacity:.9;
}

/* CARD */
.card{
    width:90%;
    max-width:800px;
    margin:25px auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.row{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.label{
    font-weight:600;
    color:#64748b;
}

.value{
    color:#0f172a;
}

/* STATS */
.stats{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin-top:20px;
}

.box{
    background:#f8fafc;
    padding:20px;
    border-radius:16px;
    text-align:center;
}

.box h2{
    color:#4facfe;
}

/* BUTTON */
.logout{
    display:block;
    margin-top:20px;
    text-align:center;
    padding:12px;
    background:#ef4444;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-weight:600;
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:70px;
    background:white;
    display:flex;
    justify-content:space-around;
    align-items:center;
    box-shadow:0 -5px 20px rgba(0,0,0,.08);
    z-index:999;
}

.bottom-nav a{
    text-decoration:none;
    color:#64748b;
    font-size:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    transition:0.3s;
}

.bottom-nav a i{
    font-size:20px;
    margin-bottom:4px;
}

.bottom-nav a span{
    font-size:12px;
}

.bottom-nav a:hover{
    color:#4facfe;
}

.bottom-nav .active{
    color:#4facfe;
    font-weight:600;
}

</style>
</head>

<body>

<div class="hero">

    <div class="avatar">
        {{ user.fullname[0] }}
    </div>

    <h1>{{ user.fullname }}</h1>
    <p>Provider Account</p>

</div>

<div class="card">

<h2 style="margin-bottom:20px;">
    <i class="fa-solid fa-user"></i>
    Account Information
</h2>

<div class="row">
    <span class="label">
        <i class="fa-solid fa-envelope"></i>
        Email
    </span>

    <span class="value">
        {{ user.email }}
    </span>
</div>

<div class="row">
    <span class="label">
        <i class="fa-solid fa-phone"></i>
        Phone
    </span>

    <span class="value">
        {{ user.phone }}
    </span>
</div>

<div class="row">
    <span class="label">
        <i class="fa-solid fa-user-tag"></i>
        Role
    </span>

    <span class="value">
        {{ user.role }}
    </span>
</div>

</div>
<!-- FIXED NAV -->
<div class="bottom-nav">

    <a href="/provider_dashboard">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
</a>

<a href="/analytics">
    <i class="fa-solid fa-chart-line"></i>
    <span>Analytics</span>
</a>

<a href="/add_product">
    <i class="fa-solid fa-circle-plus"></i>
    <span>Add</span>
</a>

<a href="/reviews">
    <i class="fa-solid fa-star"></i>
    <span>Reviews</span>
</a>

<a href="/provider_dashboard/orders">
    <i class="fa-solid fa-file-invoice"></i>
    <span>Orders</span>
</a>
</div>

</body>
</html>
