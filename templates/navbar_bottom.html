       class="nav-item {% if request.path == '/cart' %}active{% endif %}">

        <span>Cart</span>
    </a>

    <a href="/orders"
       class="nav-item {% if request.path == '/orders' %}active{% endif %}">
        <i class="fa-solid fa-box"></i>

<style>

/* Floating Bottom Navigation */

.bottom-nav{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    width:95%;
    max-width:650px;
    height:75px;

    background:rgba(255,255,255,.92);
    backdrop-filter:blur(20px);

    border-radius:24px;
    box-shadow:
        0 10px 30px rgba(0,0,0,.12),
        0 2px 10px rgba(79,172,254,.15);

    display:flex;
    justify-content:space-around;
    align-items:center;

    z-index:9999;
    border:1px solid rgba(255,255,255,.4);
}

/* Nav Item */

.nav-item{
    text-decoration:none;
    color:#64748b;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    gap:4px;

    min-width:65px;
    height:60px;

    border-radius:18px;
    transition:.35s ease;
    position:relative;
}

/* Icons */

.nav-item i{
    font-size:20px;
    transition:.35s;
}

/* Text */

.nav-item span{
    font-size:11px;
    font-weight:600;
    letter-spacing:.3px;
}

/* Hover */

.nav-item:hover{
    color:#4facfe;
    transform:translateY(-4px);
}

/* Active */

.nav-item.active{
    color:white;
    background:linear-gradient(
        135deg,
        #4facfe,
        #00c6ff
    );

    box-shadow:0 8px 20px rgba(79,172,254,.35);
}

.nav-item.active i{
    transform:scale(1.15);
}

/* Body Padding */

body{
    padding-bottom:110px;
}

/* Desktop Hide */

@media(min-width:992px){
    .bottom-nav{
        max-width:750px;
    }
}
@media(min-width:992px){
    .bottom-nav{
        display:none;
    }
}
</style>
