<style>

/* Floating Bottom Navigation */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;

    background:rgba(255,255,255,.95);
    backdrop-filter:blur(18px);

    display:flex;
    justify-content:space-around;
    align-items:center;

    padding:10px 8px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));

    box-shadow:0 -2px 20px rgba(0,0,0,.08);
    z-index:9999;
}

/* Nav Item */
.nav-item{
    flex:1;
    text-decoration:none;
    color:#64748b;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    gap:3px;

    padding:6px 0;
    border-radius:14px;

    transition:.25s ease;
    min-width:0;
}

/* Icon */
.nav-item i{
    font-size:20px;
}

/* Text */
.nav-item span{
    font-size:11px;
    font-weight:600;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

/* Hover */
.nav-item:hover{
    color:#4facfe;
    transform:translateY(-2px);
}

/* Active */
.nav-item.active{
    color:white;
    background:linear-gradient(135deg,#4facfe,#00c6ff);
}

/* MOBILE SMALL PHONES */
@media (max-width: 480px){

    .nav-item span{
        font-size:10px;
    }

    .nav-item i{
        font-size:18px;
    }

    .bottom-nav{
        padding:8px 5px;
    }
}

/* VERY SMALL PHONES */
@media (max-width: 360px){

    .nav-item span{
        display:none; /* only icons */
    }

    .nav-item i{
        font-size:20px;
    }
}

/* TABLETS */
@media (min-width: 768px){

    .bottom-nav{
        max-width:600px;
        left:50%;
        transform:translateX(-50%);
        border-radius:20px;
        bottom:15px;
    }
}


/* page spacing */
body{
    padding-bottom:80px;
}
</style>
